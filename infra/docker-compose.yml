services:
  postgres:
    image: postgres:16-alpine
    container_name: xavfsizmi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: xavfsizmi
      POSTGRES_PASSWORD: xavfsizmi_dev
      POSTGRES_DB: xavfsizmi
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xavfsizmi -d xavfsizmi"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: xavfsizmi-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    container_name: xavfsizmi-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  postgres-data:
  redis-data:
